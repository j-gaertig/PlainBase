name: "🐛 Bug Report"
description: "Report a bug"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting an issue. Please provide as much detail as possible so we can reproduce and fix it quickly."

  - type: input
    id: server-type
    attributes:
      label: "Server Software"
      description: "For example: Paper, Purpur, Spigot, Folia"
      placeholder: "Paper"
    validations:
      required: true

  - type: input
    id: server-version
    attributes:
      label: "Server Version"
      description: "Output of the /version command"
      placeholder: "26.1.2.build.64-stable"
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: "Plugin Version"
      description: "The exact version of this plugin you are running"
      placeholder: "0.0.2-Experimental"
    validations:
      required: true

  - type: dropdown
    id: affected-module
    attributes:
      label: "Module Selection"
      description: "Select the closest matching module"
      options:
        - global/core
        - spawn
        - teleport (TPA/RTP)
        - messages/broadcast
        - join items
        - other
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: "Expected Behavior"
      description: "What should happen instead?"
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: "Actual Behavior"
      description: "What happens right now?"
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: "Steps to Reproduce"
      description: "Tell us exactly how to reproduce the bug step by step."
      placeholder: "1. Install the plugin\n2. Run command /...\n3. See error"
    validations:
      required: true

  - type: textarea
    id: logs-errors
    attributes:
      label: "Console Logs or Error Dumps"
      description: "Paste relevant server logs or stack traces (or link a paste service)."
      render: text
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: "Anything else that might help (screenshots, configs, timing, etc.)"
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: "Pre-Submission Checklist"
      options:
        - label: "I tested with the latest PlainBase version."
          required: true
        - label: "I searched existing issues and did not find a duplicate."
          required: true
