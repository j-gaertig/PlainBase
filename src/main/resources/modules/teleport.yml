tpa:
  enabled: true
  request_timeout: 300 # in seconds
  counter:
    enabled: true
    seconds: 3 # in seconds
    # You can use "move", "damage", "death", "interact" or leave it empty for no cancelation
    cancel_on:
      - move
      - damage
      - death
      - interact
  commands:
      tpa:
        enabled: true
      tpahere:
        enabled: true
      tpaccept:
        enabled: true
      tpdeny:
        enabled: true
      tpauto:
        enabled: true
      tpacancel:
        enabled: true

rtp:
  enabled: true
  cooldown: 60 # in seconds
  counter:
    enabled: true
    seconds: 3 # in seconds
    # You can use "move", "damage", "death", "interact" or leave it empty for no cancelation
    cancel_on:
      - move
      - damage
      - death
      - interact
  commands:
      rtp:
        enabled: true

# DO NOT EDIT BELOW UNLESS YOU KNOW WHAT YOU ARE DOING
version: 1.0