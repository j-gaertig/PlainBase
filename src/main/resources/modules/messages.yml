# Join & Quit Messages
messages:
  join: "<bold><gray>[<green>+</green>] <white>%player%</white>"
  first-join: "<gradient:gold:yellow>Welcome!</gradient> <white>%player%</white>"
  quit: "<gray>[<red>-</red>] <white>%player%</white>"

# Command & Error Messages
errors:
  module-disabled: "<red>This module is currently disabled."
  command-disabled: "<red>This command has been disabled."
  player-not-found: "<red>Player not found!"
  teleport-self: "<red>You cannot teleport to yourself!"
  player-only: "<red>This command can only be executed by players."
  usage-tpa: "<yellow>Usage: <gray>/tpa <player>"
  usage-tpahere: "<yellow>Usage: <gray>/tpahere <player>"

# Welcome Message of the Day (MOTD)
motd:
  enabled: true
  lines:
    - "<gradient:gold:yellow>Welcome to our server!</gradient>"
    - ""

# Broadcast Messages
broadcasts:
  enabled: true
  message1:
    text: "<yellow>Report unserious players by using /report</yellow>"
    cooldown: 300 # in seconds
  message2:
    text: "<yellow>Be nice and don't insult anyone in the chat!</yellow>"
    cooldown: 60 # in seconds

# DO NOT EDIT BELOW UNLESS YOU KNOW WHAT YOU ARE DOING
version: 1.0